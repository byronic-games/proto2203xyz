<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>52! Cheat Index</title>
  <link rel="stylesheet" href="cheat-index.css">
</head>
<body>
  <main class="catalog-shell">
    <header class="catalog-header">
      <h1>52! Cheat Index</h1>
      <p>Live view from <code>js/cheats.js</code> for fast balancing and expansion.</p>
      <div class="header-actions">
        <a href="index.html">Back To Intro</a>
        <a href="game.html">Open Game</a>
      </div>
    </header>

    <section class="panel">
      <div class="panel-top">
        <label for="cheat-search">Filter</label>
        <input id="cheat-search" type="text" placeholder="Search by name, id, rarity, or condition">
        <button id="download-csv-btn" type="button">Download CSV</button>
      </div>
      <div id="catalog-summary" class="summary"></div>
      <div class="table-wrap">
        <table id="cheat-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Rarity</th>
              <th>Unlock</th>
              <th>Included</th>
              <th>Stacking</th>
              <th>Weight</th>
              <th>Conditions</th>
              <th>Description</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="js/constants.js"></script>
  <script src="js/cheats.js"></script>
  <script src="js/cheat-balance-overrides.js"></script>
  <script src="js/apply-cheat-balance-overrides.js"></script>
  <script src="js/cheat-index.js"></script>
</body>
</html>
