<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#120b1a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="52! Daily">
  <title>52! Daily</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="daily.css">
</head>
<body>
  <main class="daily-shell">
    <section class="daily-card">
      <p class="eyebrow">Shared Daily Run</p>
      <h1>52! Daily</h1>
      <p class="lead">One seeded attempt for everyone. Same deck. Same opening powers. Same cheat offers.</p>

      <section class="daily-summary">
        <div class="summary-block">
          <div class="summary-label">Daily Date</div>
          <div class="summary-value" id="daily-date-label">-</div>
        </div>
</section>

      <section class="daily-player">
        <label class="field-label" for="daily-name-input">Player Name</label>
        <input id="daily-name-input" type="text" maxlength="24" autocomplete="name" placeholder="Your name">
        <p id="daily-status" class="daily-status"></p>
      </section>

      <section class="daily-result" id="daily-result-panel">
        <div class="summary-block summary-highlight">
          <div class="summary-label">Your Score</div>
          <div class="summary-value" id="daily-score-label">-</div>
        </div>
      </section>

      <div class="daily-actions">
        <button id="daily-start-btn" class="btn btn-primary" type="button">Play Daily</button>
        <button id="daily-close-btn" class="btn btn-secondary" type="button">Close</button>
      </div>

      <section class="daily-board">
        <div class="section-bar">
          <div class="section-title">Daily Leaderboard</div>
          <div class="section-chip" id="daily-board-count">0 entries</div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Rank</th>
                <th>Name</th>
                <th>Score</th>
              </tr>
            </thead>
            <tbody id="daily-table-body">
              <tr><td colspan="3">Loading daily board...</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <script src="js/constants.js"></script>
  <script src="js/leaderboard.js"></script>
  <script src="js/daily.js"></script>
  <script src="js/daily-page.js"></script>
</body>
</html>
