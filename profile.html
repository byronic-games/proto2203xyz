<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#120b1a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="52!">
  <title>52! Profile</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="profile.css">
</head>
<body class="profile-page">
  <main class="profile-shell">
    <section class="profile-card">
      <p class="eyebrow">Player Passport</p>
      <div class="profile-topline">
        <div>
          <h1>52! Profile</h1>
          <p class="lead">Your current stamps, totals, and deck history.</p>
        </div>
        <div class="profile-stamp" id="profile-stamp">New Challenger</div>
      </div>

      <section class="profile-block">
        <div class="section-title">Player Name</div>
        <input id="profile-name-input" type="text" maxlength="24" autocomplete="name" placeholder="Your name">
      </section>

      <section class="profile-block">
        <div class="section-title">Stats</div>
        <div class="profile-stats-grid">
          <article class="profile-stat">
            <div class="profile-stat-label">Best Run</div>
            <div class="profile-stat-value" id="profile-best-run">0</div>
          </article>
          <article class="profile-stat">
            <div class="profile-stat-label">Total Correct</div>
            <div class="profile-stat-value" id="profile-total-correct">0</div>
          </article>
          <article class="profile-stat">
            <div class="profile-stat-label">Decks Beaten</div>
            <div class="profile-stat-value" id="profile-decks-beaten">0</div>
          </article>
          <article class="profile-stat">
            <div class="profile-stat-label">Runs Started</div>
            <div class="profile-stat-value" id="profile-runs-started">0</div>
          </article>
          <article class="profile-stat">
            <div class="profile-stat-label">Blue Clears</div>
            <div class="profile-stat-value" id="profile-blue-clears">0</div>
          </article>
          <article class="profile-stat">
            <div class="profile-stat-label">Red Clears</div>
            <div class="profile-stat-value" id="profile-red-clears">0</div>
          </article>
          <article class="profile-stat">
            <div class="profile-stat-label">Green Clears</div>
            <div class="profile-stat-value" id="profile-green-clears">0</div>
          </article>
          <article class="profile-stat">
            <div class="profile-stat-label">Blue Runs</div>
            <div class="profile-stat-value" id="profile-blue-runs">0</div>
          </article>
          <article class="profile-stat">
            <div class="profile-stat-label">Red Runs</div>
            <div class="profile-stat-value" id="profile-red-runs">0</div>
          </article>
          <article class="profile-stat">
            <div class="profile-stat-label">Green Runs</div>
            <div class="profile-stat-value" id="profile-green-runs">0</div>
          </article>
          <article class="profile-stat">
            <div class="profile-stat-label">Daily Attempts</div>
            <div class="profile-stat-value" id="profile-daily-attempts">0</div>
          </article>
          <article class="profile-stat">
            <div class="profile-stat-label">Dailies Cleared</div>
            <div class="profile-stat-value" id="profile-daily-clears">0</div>
          </article>
        </div>
      </section>

      <section class="profile-block">
        <div class="section-title">Achievements</div>
        <div class="achievement-list" id="profile-achievement-list"></div>
      </section>

      <div class="actions">
        <button class="btn btn-secondary actions-close" id="profile-back-btn" type="button">Close</button>
      </div>
    </section>
  </main>

  <script src="js/fullscreen.js?v=20260425b"></script>
  <script src="js/constants.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/leaderboard.js"></script>
  <script src="js/profile-page.js?v=20260425a"></script>
</body>
</html>
