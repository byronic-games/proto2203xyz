<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#120b1a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="52!">
  <title>52! Heroes</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="heroes.css">
</head>
<body>
  <main class="heroes-shell">
    <section class="heroes-card">
      <p class="eyebrow">Legend Board</p>
      <h1>52! Heroes</h1>
      <p class="lead">Players who cleared all 52 cards.</p>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Seed</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="heroes-table-body">
            <tr><td colspan="3">Loading heroes...</td></tr>
          </tbody>
        </table>
      </div>

      <div class="actions">
        <a class="btn btn-primary" href="index.html">Back To Intro</a>
        <a class="btn btn-secondary" href="game.html">Play</a>
      </div>

      <p id="heroes-note"></p>
    </section>
  </main>

  <script src="js/constants.js"></script>
  <script src="js/leaderboard.js"></script>
  <script src="js/heroes.js"></script>
</body>
</html>
