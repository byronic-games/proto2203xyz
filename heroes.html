<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#120b1a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="52!">
  <title>52! Heroes</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="heroes.css?v=20260425b">
</head>
<body class="heroes-page">
  <main class="heroes-shell">
    <section class="heroes-card">
      <p class="eyebrow">Legend Board</p>
      <h1>52! Heroes</h1>
      <p class="lead">Players who cleared all 52 cards.</p>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Seed</th>
              <th>Date</th>
              <th>Deck</th>
              <th>Level</th>
              <th>Power</th>
            </tr>
          </thead>
          <tbody id="heroes-table-body">
            <tr><td colspan="6">Loading heroes...</td></tr>
          </tbody>
        </table>
      </div>

      <div class="actions">
        <button class="btn btn-secondary actions-close" id="heroes-back-btn" type="button">Close</button>
      </div>

      <p id="heroes-note"></p>
    </section>
  </main>

  <script src="js/fullscreen.js?v=20260425b"></script>
  <script src="js/constants.js?v=20260406i"></script>
  <script src="js/leaderboard.js?v=20260425b"></script>
  <script src="js/heroes.js?v=20260425b"></script>
</body>
</html>
